<style>
    :root {
        --primary: #0f172a;
        --secondary: #6366f1;
        --accent: #f43f5e;
        --light: #f8fafc;
        --glass: rgba(255, 255, 255, 0.15);
        --blur: blur(12px);
        --shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        scroll-behavior: smooth;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: var(--light);
    }

    /* HEADER */
    header {
        backdrop-filter: var(--blur);
        background: rgba(15, 23, 42, 0.7);
        padding: 20px 0;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: var(--shadow);
    }

    .header-container {
        width: 90%;
        max-width: 1200px;
        margin: auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    header h1 {
        font-size: 1.7rem;
        font-weight: 600;
        background: linear-gradient(45deg, #6366f1, #f43f5e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    nav a {
        color: white;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 25px;
        transition: 0.3s ease;
    }

    nav a:hover {
        background: var(--secondary);
    }

    main {
        width: 90%;
        max-width: 1200px;
        margin: 3rem auto;
    }

    section {
        display: none;
        animation: fadeIn 0.5s ease-in-out;
    }

    section.active {
        display: block;
    }

    /* HERO */
    .hero {
        background: var(--glass);
        backdrop-filter: var(--blur);
        padding: 3rem;
        border-radius: 20px;
        text-align: center;
        box-shadow: var(--shadow);
    }

    .hero h1 {
        font-size: 2.8rem;
        margin-bottom: 1rem;
        background: linear-gradient(45deg, #6366f1, #f43f5e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero p {
        font-size: 1.1rem;
        opacity: 0.9;
        margin-bottom: 2rem;
    }

    .btn {
        background: linear-gradient(45deg, #6366f1, #f43f5e);
        padding: 12px 30px;
        border-radius: 30px;
        color: white;
        border: none;
        cursor: pointer;
        transition: 0.3s ease;
        font-weight: 500;
    }

    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* CARDS */
    .skills, .about-section, .project-card, .contact-container {
        background: var(--glass);
        backdrop-filter: var(--blur);
        padding: 2rem;
        border-radius: 20px;
        box-shadow: var(--shadow);
        margin-bottom: 2rem;
        transition: 0.3s ease;
    }

    .skills:hover,
    .project-card:hover {
        transform: translateY(-5px);
    }

    .skills-grid, .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .skill-card {
        background: rgba(255,255,255,0.05);
        padding: 15px;
        border-radius: 15px;
        text-align: center;
        transition: 0.3s ease;
    }

    .skill-card:hover {
        background: var(--secondary);
    }

    .skill-tag {
        background: var(--secondary);
        padding: 5px 12px;
        border-radius: 20px;
        font-size: 0.8rem;
    }

    form input, form textarea {
        padding: 12px;
        border-radius: 10px;
        border: none;
        margin-bottom: 15px;
    }

    form button {
        background: linear-gradient(45deg, #6366f1, #f43f5e);
        padding: 12px;
        border-radius: 30px;
        border: none;
        color: white;
        cursor: pointer;
    }

    footer {
        text-align: center;
        padding: 20px;
        background: rgba(15, 23, 42, 0.8);
        margin-top: 3rem;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media(max-width:768px){
        .header-container{
            flex-direction: column;
            gap: 15px;
        }
    }
</style>
